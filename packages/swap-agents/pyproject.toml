[project]
name = "swap-agents"
version = "0.1.0"
description = "Schedule and manage background agent commands for swap."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "swap",
    "click>=8.0",
    "tomli-w>=1.0",
    "croniter>=2.0",
]

[project.entry-points."swap.plugins"]
agents = "swap_agents.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["swap_agents"]

[tool.uv.sources]
swap = { workspace = true }
